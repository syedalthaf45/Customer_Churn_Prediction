<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Churn Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header nav a {
      color: #bfdbfe;
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
    }
    header nav a:hover { color: #fff; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 20px; }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 32px;
      border: 1px solid #334155;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1.1rem; color: #93c5fd; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #6366f1; }
    select option { background: #1e293b; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .error {
      background: #450a0a;
      border: 1px solid #b91c1c;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #1d4ed8;
      color: #bfdbfe;
      margin-bottom: 4px;
    }
    footer { text-align: center; color: #475569; font-size: 0.8rem; padding: 30px; }
  </style>
</head>
<body>
<header>
  <h1>🔮 Customer Churn Predictor</h1>
  <nav>
    <a href="/">Predict</a>
    <a href="/metrics">Model Metrics</a>
  </nav>
</header>

<div class="container">
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <div class="card">
    <h2>📋 Customer Information</h2>
    <form method="POST" action="/predict">

      <div class="grid" style="margin-bottom:20px">
        <div class="field">
          <label>Gender</label>
          <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="field">
          <label>Senior Citizen</label>
          <select name="SeniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="field">
          <label>Has Partner</label>
          <select name="Partner">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
        <div class="field">
          <label>Has Dependents</label>
          <select name="Dependents">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div class="field">
          <label>Tenure (Months)</label>
          <input type="number" name="tenure" value="12" min="0" max="72"/>
        </div>
        <div class="field">
          <label>Monthly Charges ($)</label>
          <input type="number" name="MonthlyCharges" value="65.00" step="0.01"/>
        </div>
        <div class="field">
          <label>Total Charges ($)</label>
          <input type="number" name="TotalCharges" value="780.00" step="0.01"/>
        </div>
      </div>

      <div class="card" style="background:#0f172a; border-color:#1e3a5f">
        <h2 style="color:#7dd3fc">📞 Services Subscribed</h2>
        <div class="grid">
          <div class="field">
            <label>Phone Service</label>
            <select name="PhoneService">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="field">
            <label>Multiple Lines</label>
            <select name="MultipleLines">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No phone service">No Phone Service</option>
            </select>
          </div>
          <div class="field">
            <label>Internet Service</label>
            <select name="InternetService">
              <option value="Fiber optic">Fiber Optic</option>
              <option value="DSL">DSL</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="field">
            <label>Online Security</label>
            <select name="OnlineSecurity">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
          <div class="field">
            <label>Online Backup</label>
            <select name="OnlineBackup">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
          <div class="field">
            <label>Device Protection</label>
            <select name="DeviceProtection">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
          <div class="field">
            <label>Tech Support</label>
            <select name="TechSupport">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
          <div class="field">
            <label>Streaming TV</label>
            <select name="StreamingTV">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
          <div class="field">
            <label>Streaming Movies</label>
            <select name="StreamingMovies">
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="No internet service">No Internet</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card" style="background:#0f172a; border-color:#1e3a5f; margin-top:16px">
        <h2 style="color:#7dd3fc">💳 Account Details</h2>
        <div class="grid">
          <div class="field">
            <label>Contract Type</label>
            <select name="Contract">
              <option value="Month-to-month">Month-to-Month</option>
              <option value="One year">One Year</option>
              <option value="Two year">Two Year</option>
            </select>
          </div>
          <div class="field">
            <label>Paperless Billing</label>
            <select name="PaperlessBilling">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="field">
            <label>Payment Method</label>
            <select name="PaymentMethod">
              <option value="Electronic check">Electronic Check</option>
              <option value="Mailed check">Mailed Check</option>
              <option value="Bank transfer (automatic)">Bank Transfer</option>
              <option value="Credit card (automatic)">Credit Card</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit">🔍 Predict Churn Risk</button>
    </form>
  </div>
</div>
<footer>Customer Churn Prediction System · ML Pipeline Project</footer>
</body>
</html>
